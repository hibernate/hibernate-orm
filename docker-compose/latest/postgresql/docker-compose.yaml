services:
  postgres:
    image: ${POSTGRESQL_IMAGE:-docker.io/postgis/postgis:18-3.6@sha256:0d513af346b21c76bf084e90c0589043c30ff379025d079ce4befa9c3a539f72}
    container_name: postgres
    platform: ${POSTGRESQL_PLATFORM:-linux/amd64}
    environment:
      POSTGRES_USER: hibernate_orm_test
      POSTGRES_PASSWORD: hibernate_orm_test
      POSTGRES_DB: hibernate_orm_test
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
      - -c
      - shared_buffers=256MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - max_wal_size=1GB
      - -c
      - checkpoint_timeout=1d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hibernate_orm_test"]
      interval: 5s
      timeout: 5s
      retries: 10
