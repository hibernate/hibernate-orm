services:
  spanner:
    image: ${SPANNER_EMULATOR:-gcr.io/cloud-spanner-emulator/emulator:1.5.54@sha256:caf1bd24c081e005837b5977bae5a250e25cb4da9f25ec1abc91936ad67e4de2}
    container_name: ${SPANNER_CONTAINER_NAME:-spanner}
    ports:
      - "${SPANNER_GRPC_PORT:-9011}:9010"
      - "${SPANNER_REST_PORT:-9021}:9020"
  spanner-healthcheck:
    # Sidecar: spanner emulator image has no tools, so we use UBI to run the healthcheck:
    image: registry.access.redhat.com/ubi9/ubi-minimal:latest@sha256:5b74fce9d6e629942a0c6dc0f546c193e70d7f974d999a48c948c53dd3d36362
    container_name: ${SPANNER_CONTAINER_NAME:-spanner}_healthcheck
    depends_on:
      spanner:
        condition: service_started
    entrypoint: [ "tail", "-f", "/dev/null" ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://spanner:9020/v1/projects/test-project/instanceConfigs || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 20
