services:
  tidb:
    image: ${TIDB_IMAGE:-docker.io/pingcap/tidb:v8.5.6@sha256:8a6f9a6bf24abed3d24980cd045d30d817dd10ab7d748ac1bb4dc7fc7fe9790a}
    container_name: tidb
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:10080/status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
  mysql-client:
    image: docker.io/library/mysql:9.7@sha256:ad88e1c86cbf12ef52d0a0360cd4b774d22956c5ee9c565645fb019d7aacb6c3
    entrypoint: [ "/bin/sh", "-c" ]
    depends_on:
      tidb:
        condition: service_healthy
    command:
      - |
        mysql -h tidb -P 4000 -uroot -e "$TIDB_DB_SETUP"
        echo "Setup complete. Keeping container alive for Compose..."
        tail -f /dev/null
