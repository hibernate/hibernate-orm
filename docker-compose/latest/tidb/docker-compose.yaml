services:
  tidb:
    image: ${TIDB_IMAGE:-docker.io/pingcap/tidb:v8.5.6@sha256:a4ac24fd63c20195d062156531e9269d6ef84d4e4a6d7fea664d09e4b5c0f3d4}
    container_name: tidb
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:10080/status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
  mysql-client:
    image: docker.io/library/mysql:9.7@sha256:c11782aa2a96624c1efc121768641d96954faa136d6aa82751b032d8c426ffbc
    entrypoint: [ "/bin/sh", "-c" ]
    depends_on:
      tidb:
        condition: service_healthy
    command:
      - |
        mysql -h tidb -P 4000 -uroot -e "$TIDB_DB_SETUP"
        echo "Setup complete. Keeping container alive for Compose..."
        tail -f /dev/null
