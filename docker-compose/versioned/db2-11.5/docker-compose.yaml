services:
  db2:
    image: ${DB_IMAGE_DB2_11_5:-icr.io/db2_community/db2:11.5.9.0@sha256:77095d4e04cf4448c0257086afcb2c166193d718dc33441da3b949f97e21efd5}
    container_name: db2
    privileged: true
    ports:
      - "50000:50000"
    environment:
      DB2INSTANCE: orm_test
      DB2INST1_PASSWORD: orm_test
      DBNAME: orm_test
      LICENSE: accept
      AUTOCONFIG: "false"
      ARCHIVE_LOGS: "false"
      TO_CREATE_SAMPLEDB: "false"
      REPODB: "false"
      BLU: "false"
      ENABLE_ORACLE_COMPATIBILITY: "false"
      UPDATEAVAIL: "NO"
      PERSISTENT_HOME: "true"
      HADR_ENABLED: "false"
    shm_size: 2g
    healthcheck:
      test: ["CMD-SHELL", "su - orm_test -c 'source ~/sqllib/db2profile && db2 connect to orm_test && db2 connect reset'"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 200s
