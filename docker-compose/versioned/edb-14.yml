services:
  edb:
    image: ${DB_IMAGE_EDB_14:-edb-test:14}
    container_name: edb
    platform: ${POSTGRESQL_PLATFORM:-linux/amd64}
    build:
      context: ../build-config/edb
      dockerfile: edb14.Dockerfile
      platforms:
        - ${POSTGRESQL_PLATFORM:-linux/amd64}
    environment:
      POSTGRES_USER: hibernate_orm_test
      POSTGRES_PASSWORD: hibernate_orm_test
      POSTGRES_DB: hibernate_orm_test
    ports:
      - "5444:5444"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hibernate_orm_test -p 5444"]
      interval: 5s
      timeout: 5s
      retries: 10
