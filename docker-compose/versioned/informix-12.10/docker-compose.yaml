services:
  informix:
    image: ${DB_IMAGE_INFORMIX_12_10:-ibmcom/informix-developer-database:12.10.FC12W1DE@sha256:da8e2f94f8897105ae463feb2465efd74c5879184f323061b4ac3a4b54d829ee}
    container_name: informix
    privileged: true
    ports:
      - "9088:9088"
    environment:
      LICENSE: accept
      GL_USEGLU: "1"
    healthcheck:
      test: [ "CMD-SHELL", "export INFORMIXDIR=/opt/ibm/informix INFORMIXSERVER=informix PATH=/opt/ibm/informix/bin:$$PATH && echo 'SELECT FIRST 1 tk_id FROM ph_task;' | dbaccess sysadmin > /dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 60
