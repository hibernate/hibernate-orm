services:
  mssql:
    image: ${DB_IMAGE_MSSQL_2022:-mcr.microsoft.com/mssql/server:2022-latest@sha256:2dca9ee5cd5316952d9b6ef4a0c088ac95b55e3502accdda0fc12ad6ede7b905}
    container_name: mssql
    environment:
      SA_PASSWORD: Hibernate_orm_test
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Hibernate_orm_test -Q 'SELECT 1' -C"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 10
