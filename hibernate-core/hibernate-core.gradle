import org.apache.tools.ant.filters.ReplaceTokens

plugins {
    id "local.publishing-java-module"
    id "local.publishing-group-relocation"

    alias(libs.plugins.versionInjection)
    alias(libs.plugins.hibernateBuildAntlr)
    alias(libs.plugins.hibernateXjc)
    id "me.champeau.jmh" version "0.7.2"
}

description = 'Hibernate\'s core ORM functionality'

configurations {
    tests {
        description = 'Configuration for the produced test jar'
    }
}

tasks.named("forbiddenApisJmh") {
    enabled = false
}

dependencies {
    api libs.jakarta.jpa
    api libs.jakarta.jta

    api libs.hibernateModels
    implementation libs.byteBuddy

    implementation libs.jakarta.jaxbApi
    implementation libs.jakarta.jaxb
    implementation libs.jakarta.inject

    implementation libs.antlrRuntime

    compileOnly libs.jakarta.jacc
    compileOnly libs.jakarta.validation
    compileOnly libs.jakarta.cdi
    compileOnly libs.jakarta.data
    compileOnly libs.jakarta.jsonbApi
    compileOnly libs.jackson
    compileOnly libs.jacksonXml
    compileOnly libs.jackson3
    compileOnly libs.jackson3Xml
    compileOnly libs.jdbc.postgresql
    compileOnly libs.jdbc.edb

    testImplementation project(':hibernate-testing')
    testImplementation project(':hibernate-ant')
    testImplementation project(':hibernate-scan-jandex')

    // todo : to get rid of these
    testImplementation libs.test.junit4
    testImplementation libs.test.junit4Engine

    testImplementation libs.test.shrinkwrap
    testImplementation libs.test.shrinkwrapDescriptors
    testImplementation libs.jakarta.cdi
    testImplementation libs.jakarta.data
    testImplementation libs.jakarta.jacc
    testImplementation libs.jakarta.validation
    testImplementation( libs.test.validator ) {
        // for test runtime
        transitive = true
    }
    testImplementation libs.jdbc.h2
    testImplementation libs.hibernateModelsJandex

    testRuntimeOnly libs.byteBuddy
    testRuntimeOnly libs.test.weld
    implementation libs.logging
    testRuntimeOnly(libs.test.wildFlyTxnClient) {
        // WildFly Elytron includes a whole copy of JBoss Logging, Jackson with its original package,
        // not even shaded, which causes lots of problems.
        // Since we don't need WildFly Elytron in our tests, we'll just exclude it.
        exclude group: 'org.wildfly.security', module: 'wildfly-elytron'
    }
    testImplementation libs.jandex
    testImplementation libs.jakarta.jsonb
    testImplementation libs.jackson
    testRuntimeOnly libs.jacksonXml
    testRuntimeOnly libs.jacksonJsr310
    testImplementation libs.jackson3
    testImplementation libs.jackson3Xml

    testAnnotationProcessor project( ':hibernate-processor' )

    // NOTE: it seems like, since 4.10, the Antlr Tool no longer defines
    // transitive dep on the corresponding Antlr Runtime.  At least, I get
    // errors about mismatched versions if I do not include the runtime
    // dependency here.
    antlr libs.antlr
	antlr libs.antlrRuntime

	// JMH benchmarks
	jmh libs.jdbc.h2
}

jar {
    manifest {
        attributes(
                'Main-Class': 'org.hibernate.Version'
        )
    }
}

ext {
    jaxbTargetDir = project.layout.buildDirectory.dir("generated/sources/xjc/main").get().asFile
}

sourceSets {
    test {
        resources {
            srcDir 'src/test/resources'
            srcDir 'src/test/bundles'
        }
    }
}

jmh {
    jmhVersion = '1.37'
    warmupIterations = 5
    iterations = 10
    fork = project.hasProperty( 'jmh.fork' ) ? project.property( 'jmh.fork' ) as int : 1
    zip64 = true

    // Force JMH to use minimal logging configuration from src/jmh/resources
    // Without this, it picks up src/test/resources/log4j2.properties with TRACE logging
    // which generates millions of log lines and severely degrades benchmark performance
    jvmArgs = ['-Dlog4j.configurationFile=file:src/jmh/resources/log4j2.properties']

    // Can be overridden via -Pjmh.include="pattern"
    if (project.hasProperty('jmh.include')) {
        includes = [project.property('jmh.include')]
    }

    // JFR profiler support - can be enabled via -Pjmh.profiler=true
    if (project.hasProperty('jmh.profiler')) {
        profilers = ['jfr']
    }
}

xjc {
    outputDirectory = project.jaxbTargetDir

    schemas {
        configuration {
            xsdFile = file( 'src/main/resources/org/hibernate/jpa/persistence_4_0.xsd' )
            xjcBindingFile = file( 'src/main/xjb/configuration-bindings.xjb' )
            xjcPlugins('inheritance', 'simplify')
        }
        mapping {
            xsdFile = file( 'src/main/resources/org/hibernate/xsd/mapping/mapping-9.0.xsd' )
            xjcBindingFile = file( 'src/main/xjb/mapping-bindings.xjb' )
            xjcPlugins('inheritance', 'simplify')
        }
    }
}

versionInjection {
    into( 'org.hibernate.Version', 'initVersion' )
}

tasks.register('copyBundleResourcesXml', Copy) {
    inputs.property( "db", db )
    inputs.property( "dbHost", dbHost )
    ext {
        bundlesTargetDir = layout.buildDirectory.dir("bundles").get().asFile
        // Escape
        bundleTokens = [
                'db.dialect' : dbBundle[db]['db.dialect'].replace("&", "&amp;"),
                'jdbc.driver' : dbBundle[db]['jdbc.driver'].replace("&", "&amp;"),
                'jdbc.user' : dbBundle[db]['jdbc.user'].replace("&", "&amp;"),
                'jdbc.pass' : dbBundle[db]['jdbc.pass'].replace("&", "&amp;"),
                'jdbc.url' : dbBundle[db]['jdbc.url'].replace("&", "&amp;"),
                'jdbc.datasource' : dbBundle[db]['jdbc.datasource'].replace("&", "&amp;"),
                'connection.init_sql' : dbBundle[db]['connection.init_sql'].replace("&", "&amp;")
        ]
        ext.bundleTokens['buildDirName'] = project.relativePath( layout.buildDirectory.asFile.get() )
    }

    from('src/test/bundles/templates') {
        include '**/*.xml'
    }
    into ext.bundlesTargetDir
    filter( ReplaceTokens, tokens: ext.bundleTokens)

    doFirst {
        ext.bundlesTargetDir.mkdirs()
    }
}

tasks.register('copyBundleResourcesNonXml', Copy) {
    inputs.property( "db", db )
    ext {
        bundlesTargetDir = layout.buildDirectory.dir("bundles").get().asFile
        // Escape
        bundleTokens = dbBundle[db]
        ext.bundleTokens['buildDirName'] = project.relativePath(layout.buildDirectory.asFile.get())
    }

    from('src/test/bundles/templates') {
        exclude '**/*.xml'
    }
    into ext.bundlesTargetDir
    filter( ReplaceTokens, tokens: ext.bundleTokens)

    doFirst {
        ext.bundlesTargetDir.mkdirs()
    }
}

tasks.register('copyBundleResources', Copy) {
    inputs.property( "db", db )
    dependsOn tasks.copyBundleResourcesXml
    dependsOn tasks.copyBundleResourcesNonXml
}

processTestResources {
    dependsOn copyBundleResources
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

sourcesJar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

tasks.register('testJar', Jar) {
    dependsOn testClasses
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveClassifier.set( 'test' )
    from sourceSets.test.output
}

artifacts {
    tests testJar
}

compileTestJava {
    options.compilerArgs += [ "-AsuppressJakartaDataMetamodel=true" ]
}

def hbmXmlTestExclusionClassNames = providers.provider {
    def testClassInfo = [:]
    def testClassesBySimpleName = [:].withDefault { [] }
    def hbmXmlTestClasses = [] as Set
    def testJavaRoot = layout.projectDirectory.dir( 'src/test/java' ).asFile

    fileTree( testJavaRoot ).matching { include '**/*.java' }.files.each { javaFile ->
        def source = javaFile.text
        def packageMatcher = source =~ /(?m)^package\s+([\w.]+);/
        def classMatcher = source =~ /(?m)^\s*(?:public\s+|protected\s+|private\s+)?(?:abstract\s+|final\s+|static\s+)*class\s+(\w+)(?:\s+extends\s+([\w.]+)(?:<[^>{}]+>)?)?/
        if ( !packageMatcher.find() || !classMatcher.find() ) {
            return
        }

        def packageName = packageMatcher.group( 1 )
        def className = classMatcher.group( 1 )
        def classNameFqn = "${packageName}.${className}"
        def superClassName = classMatcher.groupCount() >= 2 ? classMatcher.group( 2 ) : null
        testClassInfo[classNameFqn] = [ file: javaFile, packageName: packageName, superClassName: superClassName ]
        testClassesBySimpleName[className].add( classNameFqn )

        def relativePath = testJavaRoot.toPath().relativize( javaFile.toPath() ).toString()
        if ( source.contains( '.hbm.xml' )
                || source.contains( '<hibernate-mapping' )
                || relativePath.contains( "${File.separator}hbm${File.separator}" ) ) {
            hbmXmlTestClasses.add( classNameFqn )
        }
    }

    // This subclass inherits its HBM mapping through AggressiveReleaseTest but has no direct source-level HBM reference.
    hbmXmlTestClasses.add( 'org.hibernate.orm.test.connections.CurrentSessionConnectionTest' )

    def added
    do {
        added = false
        testClassInfo.each { classNameFqn, classInfo ->
            if ( hbmXmlTestClasses.contains( classNameFqn ) || classInfo.superClassName == null ) {
                return
            }

            def superClassCandidates = []
            if ( classInfo.superClassName.contains( '.' ) ) {
                superClassCandidates.add( classInfo.superClassName )
            }
            else {
                superClassCandidates.add( "${classInfo.packageName}.${classInfo.superClassName}" )
                superClassCandidates.addAll( testClassesBySimpleName[classInfo.superClassName] )
            }

            if ( superClassCandidates.any { hbmXmlTestClasses.contains( it ) } ) {
                hbmXmlTestClasses.add( classNameFqn )
                added = true
            }
        }
    } while ( added )

    hbmXmlTestClasses.sort()
}

tasks.register( "generateAnnotationClasses", JavaCompile ) {
    description = "Generate concrete classes for Hibernate and JPA annotations"

    source = sourceSets.main.allJava
    include "org/hibernate/annotations/*"
    classpath = sourceSets.main.runtimeClasspath + sourceSets.main.compileClasspath
    options.annotationProcessorPath = sourceSets.main.compileClasspath
    options.compilerArgs = [
            "-proc:only",
            "-processor",
            "org.hibernate.orm.build.annotations.ClassGeneratorProcessor"
    ]

    destinationDirectory.set( project.layout.buildDirectory.dir( "generated/sources/annotations/" ) )
}

tasks.withType( Test.class ).configureEach { test ->
    test.systemProperty 'file.encoding', 'utf-8'
    // Allow creating a function in HSQLDB for this Java method
    test.systemProperty 'hsqldb.method_class_names', 'org.hibernate.orm.test.jpa.transaction.TransactionTimeoutTest.sleep'

    // HBM XML support has been removed on the 9.0 branch. Keep HBM-dependent tests in place so
    // conversions from the 8.0 branch can merge forward cleanly, but exclude them from this suite.
    def hbmXmlTestClasses = hbmXmlTestExclusionClassNames.get()
    def hbmXmlTestClassFileExclusions = hbmXmlTestClasses.collectMany { classNameFqn ->
        def classFilePath = classNameFqn.replace( '.', '/' )
        [
                "${classFilePath}.class",
                "${classFilePath}\$*.class",
                "**/${classFilePath}.class",
                "**/${classFilePath}\$*.class"
        ]
    }
    test.testClassesDirs = files( test.testClassesDirs.files.collect { testClassesDir ->
        fileTree( testClassesDir ) {
            exclude hbmXmlTestClassFileExclusions
        }
    } )
    test.exclude( hbmXmlTestClassFileExclusions )
    test.filter {
        hbmXmlTestClasses.each { classNameFqn ->
            excludeTestsMatching classNameFqn
            excludeTestsMatching "${classNameFqn}.*"
        }
    }

    // See org.hibernate.boot.model.naming.NamingHelperTest.DefaultCharset.set
    test.jvmArgs( ['--add-opens', 'java.base/java.nio.charset=ALL-UNNAMED'] )
    // Weld needs this to generate proxies
    test.jvmArgs( ['--add-opens', 'java.base/java.security=ALL-UNNAMED'] )
    test.jvmArgs( ['--add-opens', 'java.base/java.lang=ALL-UNNAMED'] )

    //Avoid Log4J2 classloader leaks:
    test.jvmArgs( ['-Dlog4j2.disableJmx=true'] )

    // see GradleParallelTestingResolver for how the test worker id is resolved in JDBC configs
    if ( project.db == "h2" || project.db == "hsqldb" || project.db == "postgresql" || project.db == "pgsql" || project.db == "edb"
            || project.db == "oracle_xe" || project.db == "mysql" || project.db == "mariadb"
            || project.db == "db2" || project.db == "mssql" || project.db == "cockroachdb" || project.db == "hana"
            || project.db == "tidb" || project.db == "spanner" || project.db == "hana_cloud" || project.db == "oracle" ) {
        // As soon as we hit 16+ threads, the returns are diminishing, so divide by 2
        def threadCount = Runtime.runtime.availableProcessors()
        def testThreads = project.findProperty( "test.threads" )
        if ( testThreads == null ) {
            testThreads = threadCount >= 16 ? threadCount.intdiv( 2 ) : threadCount
        }
        else {
            testThreads = Integer.parseInt( testThreads.toString() )
        }
        test.maxParallelForks = testThreads
        test.systemProperty 'maxParallelForks', test.maxParallelForks
    }
    else if ( project.db == "oracle_test_pilot_database" ) {
        // Since Oracle TestPilot databases run on separate machines, but latency is a bit higher,
        // use double the threads for testing, to hide the effect of the latency a bit
        def threadCount = Runtime.runtime.availableProcessors() * 2
        def testThreads = project.findProperty( "test.threads" )
        if ( testThreads == null ) {
            testThreads = threadCount
        }
        else {
            testThreads = Integer.parseInt( testThreads.toString() )
        }
        test.maxParallelForks = testThreads
        test.systemProperty 'maxParallelForks', test.maxParallelForks
    }
    else if ( project.db == "spannerpgsql" ) {
        // Some databases can't handle too many threads/instances, so divide by 2 by default
        def threadCount = Runtime.runtime.availableProcessors()
        def testThreads = project.findProperty( "test.threads" )
        if ( testThreads == null ) {
            testThreads = threadCount.intdiv( 2 ) ?: 1
        }
        else {
            testThreads = Integer.parseInt( testThreads.toString() )
        }
        test.maxParallelForks = testThreads
        test.systemProperty 'maxParallelForks', test.maxParallelForks
    }

}

tasks.named( "javadoc", Javadoc ) {
    configure(options) {
        overview = rootProject.file( "shared/javadoc/overview.html" )
        exclude( "**/internal/**", "org/hibernate/boot/jaxb/**", "org/hibernate/tuple/**", "org/hibernate/grammars/hql/**" )
    }
}

tasks.sourcesJar.dependsOn ':hibernate-core:generateGraphParser'
tasks.sourcesJar.dependsOn ':hibernate-core:generateDeprecated-graphParser'
tasks.sourcesJar.dependsOn ':hibernate-core:generateHqlParser'
tasks.sourcesJar.dependsOn ':hibernate-core:generateSqlScriptParser'
tasks.sourcesJar.dependsOn ':hibernate-core:generateOrderingParser'
