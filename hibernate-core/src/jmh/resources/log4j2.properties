# Minimal logging for JMH benchmarks
# Reduces output noise and improves benchmark performance

status = error

appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %m%n

rootLogger.level = error
rootLogger.appenderRef.stdout.ref = STDOUT

# Suppress Hibernate logging during benchmarks
logger.hibernate.name = org.hibernate
logger.hibernate.level = error

# Suppress SQL logging
logger.sql.name = org.hibernate.SQL
logger.sql.level = error

# Suppress JDBC logging
logger.jdbc.name = org.hibernate.orm.jdbc
logger.jdbc.level = error
