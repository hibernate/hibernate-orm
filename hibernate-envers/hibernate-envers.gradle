plugins {
    id "local.publishing-java-module"
    id "local.publishing-group-relocation"
}

description = "Deprecated - Hibernate's entity version (audit/history) support"

dependencies {
    api project( ':hibernate-core' )

    implementation libs.hibernateModels
    implementation libs.jakarta.jaxbApi
    implementation libs.jakarta.jaxb
    implementation libs.jandex
    implementation libs.hibernateModels

    compileOnly libs.ant

    annotationProcessor project( ':hibernate-processor' )
    compileOnly libs.jakarta.annotation

    testImplementation project( ':hibernate-testing' )

    testAnnotationProcessor project( ':hibernate-processor' )
}

test {
    include '**/**'
}

sourceSets {
    test {
        ext {
            enversDemoJavaDir = file( "src/demo/java" )
            enversDemoResourcesDir = file( "src/demo/resources" )
        }
        java {
            srcDir enversDemoJavaDir
        }
        resources {
            srcDir enversDemoResourcesDir
        }
    }
}

configurations {
    tests {
        description = 'Configuration for the produced test jar'
    }
}

tasks.withType( Test.class ).configureEach { test ->
    // see GradleParallelTestingResolver for how the test worker id is resolved in JDBC configs
    if ( project.db == "h2" || project.db == "hsqldb" || project.db == "postgresql" || project.db == "pgsql" || project.db == "edb"
            || project.db == "oracle_xe" || project.db == "mysql" || project.db == "mariadb"
            || project.db == "db2" || project.db == "mssql" || project.db == "cockroachdb" || project.db == "hana"
            || project.db == "tidb" || project.db == "spanner" || project.db == "spannerpgsql" ) {
        // Most systems have multi-threading and maxing out a core on both threads will hurt performance
        // Also, as soon as we hit 16+ threads, the returns are diminishing, so divide by 4
        def threadCount = Runtime.runtime.availableProcessors()
        def testThreads = project.findProperty( "test.threads" )
        if ( testThreads == null ) {
            testThreads = threadCount >= 16 ? threadCount.intdiv( 4 ) : (threadCount.intdiv( 2 ) ?: 1)
        }
        else {
            testThreads = Integer.parseInt( testThreads.toString() )
        }
        test.maxParallelForks = testThreads
        test.systemProperty 'maxParallelForks', test.maxParallelForks
    }
    else if ( project.db == "oracle_test_pilot_database" ) {
        // Since Oracle TestPilot databases run on separate machines, but latency is a bit higher,
        // use double the threads for testing, to hide the effect of the latency a bit
        def threadCount = Runtime.runtime.availableProcessors() * 2
        def testThreads = project.findProperty( "test.threads" )
        if ( testThreads == null ) {
            testThreads = threadCount
        }
        else {
            testThreads = Integer.parseInt( testThreads.toString() )
        }
        test.maxParallelForks = testThreads
        test.systemProperty 'maxParallelForks', test.maxParallelForks
    }
    else if ( project.db == "hana_cloud" || project.db == "oracle" ) {
        // Some profiles have databases on different machines or the latency
        // of the database operations justifies more parallel work,
        // so for these profiles we use a worker per thread,
        // and halve the workers only if we are on a machine with more 16+ threads,
        // to avoid overloading the system
        def threadCount = Runtime.runtime.availableProcessors()
        def testThreads = project.findProperty( "test.threads" )
        if ( testThreads == null ) {
            testThreads = threadCount >= 16 ? threadCount.intdiv( 2 ) : threadCount
        }
        else {
            testThreads = Integer.parseInt( testThreads.toString() )
        }
        test.maxParallelForks = testThreads
        test.systemProperty 'maxParallelForks', test.maxParallelForks
    }

}

sourcesJar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

task testJar(type: Jar, dependsOn: testClasses) {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveClassifier.set( 'test' )
    from sourceSets.test.output
}

artifacts {
    tests testJar
}
