plugins {
	id "local.publishing-java-module"
	id "local.publishing-group-relocation"
}

description = 'Integrate support for Spatial/GIS data into Hibernate O/RM'

jar {
	manifest {
		attributes(
				'Import-Package': [
						// PostgreSQL JDBC spatial types: used only when running against PostgreSQL
						'org.postgresql.*;resolution:=optional',
						// All other referenced packages are required
						'*'
				].join(',')
		)
	}
}

dependencies {
	api project( ':hibernate-core' )
	api libs.geolatte

	compileOnly libs.jdbc.postgresql

	testImplementation project( ':hibernate-testing' )
	testImplementation project( ':hibernate-ant' )
	testImplementation project( path: ':hibernate-core', configuration: 'tests' )

	testImplementation libs.jakarta.validation
	testImplementation libs.jandex
	testImplementation libs.test.validator
    testImplementation(libs.test.dom4j) {
        transitive = false
    }

	testImplementation libs.jdbc.postgresql
	testImplementation libs.jdbc.h2gis

    testRuntimeOnly libs.test.jaxen
	testRuntimeOnly libs.byteBuddy
}

sourceSets.test.resources {
	setSrcDirs( ['src/test/resources'] )
}

tasks.test {

	enabled = ['h2',
			   'pgsql',
			   'pgsql_ci',
			   'cockroachdb',
			   'mariadb',
			   'mariadb_ci',
			   'mysql',
			   'mysql_ci',
			   'oracle',
			   'oracle_ci',
			   'oracle_test_pilot_database',
			   'oracle_xe_ci',
			   'mssql',
			   'mssql_ci'
	].contains( project.db )
}

