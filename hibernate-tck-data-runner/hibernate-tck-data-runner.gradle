plugins {
    id "local.java-module"
    id "local.code-quality"
}

description = 'Hibernate ORM\'s Jakarta Data TCK runner'

repositories {
    org.hibernate.orm.env.Repositories.maybeAddMavenLocal(it)
    org.hibernate.orm.env.Repositories.maybeAddMavenCentralSnapshots(it) { content ->
        content.includeGroup "jakarta.persistence"
        content.includeGroup "jakarta.data"
    }
    mavenCentral()
}

// Configuration to resolve the TCK sources jar
configurations {
    tckSources {
        transitive = false
    }
}

configurations.testRuntimeClasspath {
    // arquillian-junit5-container's MethodParameterObserver causes NPEs in standalone mode;
    exclude group: 'org.jboss.arquillian.junit5', module: 'arquillian-junit5-container'
}

dependencies {
    tckSources(variantOf(libs.test.jakartaDataTck) { classifier('sources') })

    testImplementation libs.test.junitJupiterApi
    testImplementation libs.test.junitJupiterSuiteEngine

    testImplementation libs.test.jakartaDataTck
    testImplementation libs.test.jakartaDataApi
    testImplementation libs.test.jakartaDataStatefulApi

    testImplementation libs.test.weldJunit
    testImplementation libs.test.jbossJta
    testImplementation libs.test.jbossTxSpi

    testImplementation libs.jakarta.validation
    testImplementation libs.jakarta.concurrency
    testImplementation libs.jakarta.cdi

    // Arquillian/ShrinkWrap APIs needed for TCK classes
    // (TCK test classes use @Deployment with RUNTIME retention, StandaloneExtension extends ArquillianExtension)
    testImplementation libs.test.dataTckArquillianCore
    testImplementation libs.test.dataTckArquillianContainerApi
    testImplementation libs.test.dataTckShrinkwrapApi

    // Compile-only: TCK sources import these but not needed at runtime
    testCompileOnly libs.test.dataTckServletApi
    testCompileOnly libs.test.dataTckNosqlApi

    testImplementation project(':hibernate-core')
    testImplementation project(':hibernate-testing')

    testAnnotationProcessor project(':hibernate-processor')
}

// Extract TCK sources from the sources jar
def extractTckSources = tasks.register('extractTckSources', Copy) {
    from(zipTree(configurations.tckSources.singleFile)) {
        exclude '**/_AsciiChar.java'
        exclude '**/_AsciiCharacter.java'
    }
    into layout.buildDirectory.dir("tck-sources")
}

// Add extracted TCK sources as a test source directory
sourceSets.test.java.srcDir layout.buildDirectory.dir("tck-sources")


// TCK test classes intentionally not wrapped in the runner
def ignoredTckTests = [
        // because we are not working with non-jpa entities here:
        'ee.jakarta.tck.data.standalone.nosql.example.NoSQLEntityTests',
        // well... because it's a signature nonsense test:
        'ee.jakarta.tck.data.standalone.signature.SignatureTests',
].toSet()

// Warn about @Standalone TCK test classes that don't have a wrapper in our runner
def checkMissingWrappers = tasks.register('checkMissingTckWrappers') {
    dependsOn extractTckSources
    doLast {
        def tckSourcesDir = layout.buildDirectory.dir("tck-sources").get().asFile
        def wrappersDir = sourceSets.test.java.srcDirs.collect {
            new File(it, "org/hibernate/orm/jakarta/data/tck/runner/test")
        }.find { it.isDirectory() }
        def existingWrappers = (wrappersDir.listFiles() ?: []).collectMany { file ->
            def m = file.text =~ /\s++extends\s++(\w++)/
            m ? [m[0][1]] : []
        }.toSet()

        def missing = []
        fileTree(tckSourcesDir).matching { include '**/*.java' }.each { file ->
            if (file.text.contains('@Standalone')) {
                def fqcn = tckSourcesDir.toPath().relativize(file.toPath()).toString()
                        .replace('/', '.').replace('.java', '')
                def className = file.name.replace('.java', '')
                if (!existingWrappers.contains(className) && !ignoredTckTests.contains(fqcn)) {
                    missing << fqcn
                }
            }
        }
        if (!missing.isEmpty()) {
            logger.warn("WARNING: The following @Standalone TCK test classes have no wrapper in the runner:")
            missing.each { logger.warn("  - ${it}") }
            logger.warn("Create a Standalone<Name> wrapper class or add to ignoredTckTests.")
        }
    }
}

tasks.named('compileTestJava') {
    dependsOn extractTckSources, checkMissingWrappers
    options.compilerArgs += [
            '-parameters',
            '-AjakartaDataSortCompliance=true'
    ]
}

test {
    useJUnitPlatform()

    filter {
        includeTestsMatching "JakartaDataTckTestRunner"
    }

    maxParallelForks = 1

    def buildDir = project.layout.buildDirectory.get().asFile.absolutePath
    def userdir = mkdir(buildDir + "/userdir")
    def tcklogdir = mkdir(buildDir + "/tcklogs")
    systemProperties = [
            "jakarta.tck.skip.deployment"                   : "true",
            "java.util.logging.config.file"                 : "target/test-classes/logging.properties",
            "user.dir"                                      : userdir,
            "log.file.location"                             : tcklogdir,

            "jakarta.persistence.jdbc.driver"               : dbBundle[db]['jdbc.driver'],
            "jakarta.persistence.jdbc.url"                  : dbBundle[db]['jdbc.url'].replace('_$worker', ''),
            "jakarta.persistence.jdbc.user"                 : dbBundle[db]['jdbc.user'].replace('_$worker', ''),
            "jakarta.persistence.jdbc.password"             : dbBundle[db]['jdbc.pass'],

            "hibernate.connection.autocommit"                           : true,
            "hibernate.allow_update_outside_transaction"                : true,
            "hibernate.transaction.jta.platform"                        : "org.hibernate.engine.transaction.jta.platform.internal.NarayanaJtaPlatform",
            "jakarta.persistence.schema-generation.database.action"     : "drop-and-create"
    ]

    testLogging {
        showStandardStreams = true
        exceptionFormat = 'full'
        events "passed", "skipped", "failed"
    }

    onlyIf {
        project.hasProperty('rundatatck')
    }
}
