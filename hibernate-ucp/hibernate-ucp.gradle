plugins {
    id "local.publishing-java-module"
    id "local.publishing-group-relocation"
}

description = 'Integration for Oracle Universal Connection Pool within Hibernate ORM'

dependencies {
    implementation project( ':hibernate-core' )
    compileOnly libs.oracleucp
    compileOnly libs.jdbc.oracle

    testImplementation project( ':hibernate-testing' )
    testRuntimeOnly libs.oracleucp
    testRuntimeOnly libs.jdbc.oracle
}
