import org.apache.tools.ant.filters.ReplaceTokens

plugins {
    id "java-library"
    id "local.module"
    id "local.javadoc"
    id "local.databases"

    id "biz.aQute.bnd.builder"

    id "org.hibernate.orm.database-service"
    id "org.hibernate.orm.build.java-module"

    id "build-dashboard"
    id "project-report"
}

def skipJacoco = project.hasProperty('skipJacoco') ? project.getProperty('skipJacoco').toBoolean() : false
if (!skipJacoco) {
    plugins.apply('jacoco')
}

def hibernateVersion = ormBuildDetails.hibernateVersion
def jpaVersion = ormBuildDetails.jpaVersion

def java9ModuleNameBase = project.name.startsWith( 'hibernate-' ) ? name.drop( 'hibernate-'.length() ): name
def java9ModuleName = "org.hibernate.orm.$java9ModuleNameBase".replace('-','.')

sourceSets {
    test {
        resources {
            configure( srcDir('src/test/resources') ) {
            filter {
                include '*.properties'
                include '*.xml'
                include '**/*.properties'
                include '**/*.xml'
                }
            }
        }
    }
}

dependencies {
    implementation libs.logging

    compileOnly libs.loggingAnnotations
    // Used for compiling some Oracle specific JdbcTypes
    compileOnly libs.jdbc.oracle
    compileOnly (libs.jdbc.oracleJdbcJacksonOsonExtension) {
        exclude group: 'com.oracle.database.jdbc', module: 'ojdbc8'
        exclude group: 'jakarta.persistence', module: 'jakarta.persistence-api'
    }

    // JUnit dependencies made up of:
    // 		* JUnit (version 5 or later)
    // 		* the Jupiter engine which runs JUnit 6 based tests
    //		* the "vintage" engine - which runs JUnit 3 and 4 based tests
    testImplementation libs.test.junitJupiterApi
    testImplementation libs.test.junitJupiterEngine
    testImplementation libs.test.junitJupiterParams
    testImplementation libs.test.junitJupiterLauncher
    testImplementation libs.test.assertjCore

    testRuntimeOnly libs.test.log4j2
    testRuntimeOnly libs.byteBuddy

    //Databases
    testRuntimeOnly libs.jdbc.h2
    testRuntimeOnly libs.jdbc.derby
    testRuntimeOnly libs.jdbc.derbyTools
    testRuntimeOnly libs.jdbc.hsqldb
    testRuntimeOnly libs.jdbc.postgresql
    testRuntimeOnly libs.jdbc.edb
    testRuntimeOnly libs.jdbc.mssql
    testRuntimeOnly libs.jdbc.informix
    testRuntimeOnly libs.jdbc.cockroachdb
    testRuntimeOnly libs.jdbc.gaussdb
    testRuntimeOnly libs.jdbc.sybase
    testRuntimeOnly libs.jdbc.teradata
    testRuntimeOnly libs.jdbc.spanner
    testRuntimeOnly rootProject.fileTree(dir: 'drivers', include: '*.jar')

    // Since both the DB2 driver and HANA have a package "net.jpountz" we have to add dependencies conditionally
    // This is due to the "no split-packages" requirement of Java 9+

    if ( db.startsWith( 'db2' ) ) {
        testRuntimeOnly libs.jdbc.db2
    }
    else if ( db.startsWith( 'hana' ) ) {
        testRuntimeOnly libs.jdbc.hana
    }
    else if ( db.startsWith( 'mysql' ) || db.startsWith( 'tidb' ) ) {
        testRuntimeOnly libs.jdbc.mysql
    }
    else if ( db.startsWith( 'mariadb' ) ) {
        testRuntimeOnly libs.jdbc.mariadb
    }
    else if ( db.startsWith( 'firebird' ) ) {
        testRuntimeOnly libs.jdbc.firebird
    }
    else if ( db.startsWith( 'oracle' ) ) {
        testRuntimeOnly libs.jdbc.oracle
        testRuntimeOnly libs.jdbc.oracleXml
        testRuntimeOnly libs.jdbc.oracleXmlParser
        testRuntimeOnly (libs.jdbc.oracleJdbcJacksonOsonExtension) {
            exclude group: 'com.oracle.database.jdbc', module: 'ojdbc8'
            exclude group: 'jakarta.persistence', module: 'jakarta.persistence-api'
        }
    }
    else if ( db.startsWith( 'altibase' ) ) {
        testRuntimeOnly libs.jdbc.altibase
    }
    else if ( db.startsWith( 'informix' ) ) {
        testRuntimeOnly libs.jdbc.informix
    }

    annotationProcessor libs.loggingProcessor
    annotationProcessor libs.logging
    annotationProcessor libs.loggingAnnotations


    constraints {
        implementation('org.apache.logging.log4j:log4j-core') {
            version {
                strictly('[2.17.1, 3[')
                prefer('2.17.1')
            }
            because('CVE-2021-44228, CVE-2021-45046, CVE-2021-45105, CVE-2021-44832: Log4j vulnerable to remote code execution and other critical security vulnerabilities')
        }
    }
}


// ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
// Compilation

tasks.register('compile') {
    dependsOn compileJava
    dependsOn processResources
    dependsOn compileTestJava
    dependsOn processTestResources
}

tasks.withType( JavaCompile ).configureEach {
    options.encoding = 'UTF-8'
    options.warnings = false
    options.fork = true
    options.forkOptions.memoryMaximumSize = '896m'

    options.compilerArgs += [
            // Limit observable modules to prevent accidental dependency on java.desktop (HHH-20148) and other non essential modules
            '--limit-modules', 'java.base,java.compiler,java.instrument,java.management,java.naming,java.rmi,java.sql,java.transaction.xa,java.xml,jdk.compiler,jdk.jfr,java.sql.rowset',
            // disable adding @Generated annotation in the logger impls to make
            // the logging annotation processor create the same sources each time.
            "-Aorg.jboss.logging.tools.addGeneratedAnnotation=false"
    ]

    // stubs argument needs to be passed as an absolute path, JavaCompile uses the Worker API which changes the current
    // working directory and prevents from using a relative path to locate a project file.
    // Using a CommandLineArgumentProvider allows build cache hits when the build cache is relocated.
    options.compilerArgumentProviders.add(new CompilerStubsArgumentProvider(stubsDir: new File(project.rootDir, "checkerstubs")))

    if (System.getProperty('APT_DEBUG', 'false') == 'true') {
        options.forkOptions.jvmArgs += ['-Xdebug', '-Xrunjdwp:transport=dt_socket,server=y,suspend=y,address=9099']
    }
}

processTestResources {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE

    inputs.property( "db", db )
    inputs.property( "dbHost", dbHost )
    inputs.property( "dbConfig", dbBundle[db])

    doLast {
        copy {
            from( sourceSets.test.java.srcDirs ) {
                include '**/*.properties'
                include '**/*.xml'
            }
            into sourceSets.test.java.classesDirectory
        }
        copy {
            from file( 'src/test/resources' )
            into layout.buildDirectory.dir("resources/test").get().asFile
            exclude 'src/test/resources/hibernate.properties'
        }
        copy {
            from file( 'src/test/resources/hibernate.properties' )
            into layout.buildDirectory.dir("resources/test").get().asFile
            filter( ReplaceTokens, tokens: dbBundle[db] )
        }
    }
}


// ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
// Testing

tasks.withType( Test.class ).configureEach { test ->
    test.useJUnitPlatform()

    // Byteman needs this property to be set, https://developer.jboss.org/thread/274997
    test.jvmArgs += ["-Djdk.attach.allowAttachSelf=true"]

    test.jvmArgumentProviders.add(
            new HeapDumpPathProvider( path: project.layout.buildDirectory.dir("OOM-dump") )
    )

    test.jvmArgs += [
            '-XX:+HeapDumpOnOutOfMemoryError',
            '-XX:MetaspaceSize=256M'
    ]

    test.maxHeapSize = '3G'

    // Enable bytecode enhanced engine:
    test.systemProperties['hibernate.testing.bytecode.enhancement.extension.engine.enabled'] = true
    test.systemProperties['hibernate.test.validatefailureexpected'] = true
    test.systemProperties['hibernate.highlight_sql'] = false
    test.systemProperties += providers.systemPropertiesPrefixedBy("hibernate.").get()

    test.enableAssertions = true

    if ( project.name != 'hibernate-testing' ) {
        test.dependsOn ':hibernate-testing:test'
    }

    // Allow to exclude specific tests
    if ( project.hasProperty( 'excludeTests' ) ) {
        test.filter {
            excludeTestsMatching project.property('excludeTests').toString()
        }
    }
    if (!skipJacoco) {
        def coverageReportSuffix = providers.gradleProperty('db').orElse('default')
                .flatMap { db ->
                    // Oracle DBs tested on OTP are all using the same db name no matter the version...
                    // this would be a problem for creating/merging Jacoco reports, hence:
                    if ("oracle_test_pilot_database" == db) {
                        return providers.environmentVariable("RDBMS").orElse(db)
                    } else {
                        return providers.provider { db }
                    }
                }
        def javaVersion = JavaVersion.current().majorVersion
        test.jacoco {
            destinationFile = layout.buildDirectory.file(
                    coverageReportSuffix.map { db -> "jacoco/report-${db}-jdk${javaVersion}.exec" }
            ).get().asFile
        }
    }
}

test {
    inputs.property( "dbVersion", dbVersion )

    // Keep system properties in sync with gradle.properties!
    systemProperty 'user.language', 'en'
    systemProperty 'user.country', 'US'
    systemProperty 'user.timezone', 'UTC'
    systemProperty 'file.encoding', 'UTF-8'
    // Needed for AdoptOpenJDK on alpine? The problem is similar to this: https://github.com/mockito/mockito/issues/978
    jvmArgs '-XX:+StartAttachListener'

    if ( project.findProperty( 'log-test-progress' )?.toString()?.toBoolean() ) {
        // Log a statement for each test.
        // Used in the Travis build so that Travis doesn't end up panicking because there's no output for a long time.
        testLogging {
            displayGranularity = 1
            events = ["passed", "skipped", "failed"]
            exceptionFormat = 'full'
        }
    }
}

// Attach tools JAR to the classpath for byteman tests
final File toolsJar = file("${System.getProperty('java.home')}/../lib/tools.jar")
if ( toolsJar.exists() ) {
    dependencies {
        testImplementation files( toolsJar )
    }
}


// ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
// Bundling

java {
    // Configure the Java "software component" to include javadoc and sources jars in addition to the classes jar.
    withJavadocJar()
    withSourcesJar()
}

tasks.withType(Jar).configureEach {jarTask ->
    manifest {
        attributes(
                // Basic JAR manifest attributes
                'Specification-Title': project.name,
                'Specification-Version': project.version,
                'Specification-Vendor': 'Hibernate.org',
                'Implementation-Title': project.name,
                'Implementation-Version': project.version,
                'Implementation-Vendor': 'Hibernate.org',
                'Implementation-Vendor-Id': 'org.hibernate',
                'Implementation-Url': 'https://hibernate.org/orm',

                // Hibernate-specific JAR manifest attributes
                'Hibernate-VersionFamily': hibernateVersion.family,
                'Hibernate-JpaVersion': jpaVersion.name,

                'Bundle-Vendor': 'Hibernate.org',
                'Bundle-DocURL': "https://hibernate.org/orm/releases/${hibernateVersion.family}"
        )
        if ("jar".equals(jarTask.name)) {
            attributes(
                    // Java 9 module name
                    'Automatic-Module-Name': java9ModuleName,

                    // BND Plugin instructions (for OSGi):
                    '-reproducible': true,
                    '-noextraheaders': true,
                    'Bundle-Name': project.name,
                    'Bundle-SymbolicName': java9ModuleName,
                    // This is overridden in some sub-projects
                    'Import-Package': [
                            // Temporarily support JTA 1.1 -- Karaf and other frameworks still
                            // use it.  Without this, the plugin generates [1.2,2).
                            'javax.transaction;version="[1.1,2)"',
                            // Also import every package referenced in the code
                            // (note that '*' is resolved at build time to a list of packages)
                            '*'
                    ].join( ',' ),
                    '-exportcontents': "*;version=${project.version}"
            )
        }
    }
    if ("jar".equals(jarTask.name)) {
        metaInf {
            from(rootProject.projectDir, {
                include "LICENSE.txt"
            })
        }
    }
}

// ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
// Reproducible Builds

// https://docs.gradle.org/current/userguide/working_with_files.html#sec:reproducible_archives
// Configure archive tasks to produce reproducible archives:
tasks.withType(AbstractArchiveTask).configureEach {
    preserveFileTimestamps = false
    reproducibleFileOrder = true
}

// ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
// Configurations and Dependencies

configurations.configureEach {
    resolutionStrategy.eachDependency { details ->
        //Force the "byte buddy agent" version to match the Byte Buddy version
        // we use, as Mockito might pull in a mismatched version transitively
        if (details.requested.group == "net.bytebuddy" && details.requested.name == 'byte-buddy-agent') {
            details.useVersion libs.versions.byteBuddy.get()
        }

        // Force all 'checker-qual' (RUNTIME) requests to instead use 'checker-qual-android' (CLASS)
        if (details.requested.group == 'org.checkerframework' && details.requested.name == 'checker-qual') {
            details.useTarget("org.checkerframework:checker-qual-android:${details.requested.version}")
        }
    }
}

// ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
// OSGi optional import helpers

// Lists packages from compileOnly deps that are statically imported in main
// sources — these need resolution:=optional in the Import-Package header.
// Run whenever a compileOnly dependency is added or changed.
//   ./gradlew :<module>:findOptionalImports
tasks.register('findOptionalImports') {
    description = 'Lists packages from compileOnly deps that are statically imported in main sources (need resolution:=optional in Import-Package)'
    group = 'help'

    doLast {
        // 'compileOnly' is declarable-only in Gradle 9+, so we derive the compileOnly
        // artifacts by subtracting runtimeClasspath files from compileClasspath files —
        // both configurations are resolvable.
        def runtimeFiles = configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts
                .collect { it.file } as Set
        def compileOnlyPackages = [] as Set
        configurations.compileClasspath.resolvedConfiguration.resolvedArtifacts
                .findAll { !(it.file in runtimeFiles) }
                .each { artifact ->
                    if (artifact.file.name.endsWith('.jar')) {
                        new java.util.jar.JarFile(artifact.file).entries().each { entry ->
                            if (entry.name.endsWith('.class') && entry.name.contains('/')) {
                                compileOnlyPackages << entry.name.replaceAll('/[^/]+\\.class$', '').replace('/', '.')
                            }
                        }
                    }
                }

        def usedOptional = [] as SortedSet
        sourceSets.main.java.srcDirs.each { srcDir ->
            if (!srcDir.exists()) return
            srcDir.eachFileRecurse { file ->
                if (!file.name.endsWith('.java')) return
                file.eachLine { line ->
                    def m = line =~ /^import\s+(?:static\s+)?([a-z][a-zA-Z0-9.]+)\.[A-Z]/
                    if (m) {
                        def importedPkg = m[0][1]
                        if (compileOnlyPackages.any { cp -> importedPkg == cp || importedPkg.startsWith(cp + '.') }) {
                            usedOptional << importedPkg.replaceAll('\\.[a-z][^.]*$', '')
                        }
                    }
                }
            }
        }

        println "\nPackages from compileOnly deps referenced in main source (need resolution:=optional):"
        usedOptional.each { println "  '${it}.*;resolution:=optional'," }
    }
}

// Verifies that every Import-Package entry in the built jar is satisfiable from
// the runtimeClasspath, and reports any that are missing and not already marked
// resolution:=optional.  Wire this into CI alongside the jar task.
//   ./gradlew :<module>:checkOptionalImports
tasks.register('checkOptionalImports') {
    description = 'Checks that all Import-Package entries in the built jar are either satisfiable at runtime or already marked resolution:=optional'
    group = 'verification'
    dependsOn jar

    doLast {
        def runtimePkgs = [] as Set

        // Packages from runtime dependency jars
        configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            if (artifact.file.name.endsWith('.jar')) {
                new java.util.jar.JarFile(artifact.file).entries().each { entry ->
                    if (entry.name.endsWith('.class') && entry.name.contains('/'))
                        runtimePkgs << entry.name.replaceAll('/[^/]+\\.class$', '').replace('/', '.')
                }
            }
        }

        // Packages from JDK built-in modules (not present as jars on the classpath in Java 9+)
        ModuleLayer.boot().modules().each { module ->
            runtimePkgs.addAll(module.packages)
        }

        // The project's own packages: BND exports these via -exportcontents so it won't
        // emit them as imports, but the bytecode scan still sees them as references.
        sourceSets.main.output.classesDirs.each { classesDir ->
            if (!classesDir.exists()) return
            classesDir.eachFileRecurse { file ->
                if (file.name.endsWith('.class') && file.parentFile != classesDir) {
                    def pkg = classesDir.toPath().relativize(file.parentFile.toPath()).toString().replace(File.separator, '.')
                    if (pkg) runtimePkgs << pkg
                }
            }
        }

        // Packages from compileOnly *project* dependencies: these are provided by other OSGi
        // bundles at runtime (e.g. hibernate-core for hibernate-graalvm), so they are required
        // imports — not missing ones.  Only compileOnly *external* artifacts are truly absent.
        // Note: project artifacts resolve to a classes *directory*, not a jar file.
        def runtimeFileSet = configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts
                .collect { it.file } as Set
        configurations.compileClasspath.resolvedConfiguration.resolvedArtifacts
                .findAll { !(it.file in runtimeFileSet) }
                .findAll { it.id.componentIdentifier instanceof org.gradle.api.artifacts.component.ProjectComponentIdentifier }
                .each { artifact ->
                    if (artifact.file.name.endsWith('.jar')) {
                        new java.util.jar.JarFile(artifact.file).entries().each { entry ->
                            if (entry.name.endsWith('.class') && entry.name.contains('/'))
                                runtimePkgs << entry.name.replaceAll('/[^/]+\\.class$', '').replace('/', '.')
                        }
                    } else if (artifact.file.isDirectory()) {
                        artifact.file.eachFileRecurse { file ->
                            if (file.name.endsWith('.class') && file.parentFile != artifact.file) {
                                def pkg = artifact.file.toPath().relativize(file.parentFile.toPath()).toString().replace(File.separator, '.')
                                if (pkg) runtimePkgs << pkg
                            }
                        }
                    }
                }

        // Packages explicitly listed in the Import-Package *instruction* (before BND
        // expands '*') are intentional required imports — e.g. javax.transaction for
        // JTA 1.1 compatibility in Karaf — even if they're absent from runtimeClasspath.
        // Only BND-auto-discovered packages (from '*') should be verified here.
        def splitOnUnquotedCommas = { String s ->
            def result = []
            def cur = new StringBuilder()
            def inQuote = false
            s.each { ch ->
                if (ch == '"') { inQuote = !inQuote; cur.append(ch) }
                else if (ch == ',' && !inQuote) { result << cur.toString().trim(); cur = new StringBuilder() }
                else { cur.append(ch) }
            }
            if (cur.length() > 0) result << cur.toString().trim()
            result
        }

        def instruction = tasks.jar.manifest.attributes['Import-Package'] ?: ''
        def explicitImports = splitOnUnquotedCommas(instruction)
                .collect { it.replaceAll(';.*', '').trim() }
                .findAll { it != '*' }
                .toSet()

        def builtJar = tasks.jar.archiveFile.get().asFile
        def importPkg = new java.util.jar.JarFile(builtJar).manifest.mainAttributes.getValue('Import-Package') ?: ''

        def missing = []
        splitOnUnquotedCommas(importPkg).each { entry ->
            def pkg = entry.replaceAll(';.*', '')
            if (pkg == '*' || entry.contains('resolution:=optional')) return
            if (explicitImports.contains(pkg)) return   // intentional explicit import
            if (!runtimePkgs.contains(pkg)) missing << pkg
        }

        if (missing) {
            throw new GradleException(
                "The following Import-Package entries are absent from runtimeClasspath and not marked resolution:=optional.\n" +
                "Add them to the Import-Package list in ${project.name}.gradle with ';resolution:=optional':\n" +
                missing.collect { "  $it" }.join('\n')
            )
        }
        else {
            println "checkOptionalImports: all Import-Package entries are satisfiable at runtime."
        }
    }
}
