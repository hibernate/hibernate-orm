plugins {
    id "local.publishing-java-module"
    alias(libs.plugins.mavenPluginDev)
}

description = 'Maven plugin to integrate aspects of Hibernate into your build.'

sourceSets {
    intTest {
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}

configurations {
    intTestImplementation.extendsFrom implementation
    intTestRuntimeOnly.extendsFrom runtimeOnly
}

dependencies {
    implementation project( ":hibernate-core" )
    implementation project( ":hibernate-reveng" )

    implementation(libs.maven.core) {
        exclude group: 'com.google.guava', module: 'guava'
    }
    implementation(libs.maven.pluginApi) {
        exclude group: 'com.google.guava', module: 'guava'
    }
    implementation(libs.maven.fileManagement)

    compileOnly libs.maven.pluginToolsAnnotations

    intTestImplementation libs.test.junitJupiter
    intTestImplementation libs.maven.embedder
    intTestRuntimeOnly libs.maven.compat
    intTestRuntimeOnly libs.test.junitJupiterLauncher
    intTestRuntimeOnly libs.maven.resolverHttp
    intTestRuntimeOnly libs.maven.resolverBasic
    intTestRuntimeOnly libs.test.logbackClassic
    intTestRuntimeOnly libs.maven.resolverHttp
    intTestRuntimeOnly libs.maven.plexusXml
    intTestRuntimeOnly libs.jdbc.h2
}

tasks.register('integrationTest', Test) {
    description = 'Runs integration tests.'
    group = 'verification'

    testClassesDirs = sourceSets.intTest.output.classesDirs
    classpath = sourceSets.intTest.runtimeClasspath
    shouldRunAfter test

    useJUnitPlatform()

    // failing, need to fix
    enabled = false
}

tasks.forbiddenApisIntTest {
    enabled = false
}

var publishingExtension = project.getExtensions().getByType(PublishingExtension) as PublishingExtension
publishingExtension.publications.named("publishedArtifacts") {
    // Adjust the pom for 3 things:
    //      1. set packaging to maven-plugin (org.gradlex.maven-plugin-development does not in my testing)
    //      2. scope of org.apache.maven dependencies
    pom.withXml {
        asNode()
                .version
                .plus {
                    packaging('maven-plugin')
                }
        asNode()
                .dependencies
                .dependency
                .findAll { dependency ->
                    dependency.groupId.text().startsWith('org.apache.maven')
                }
                .each { dependency ->
                    if (!dependency.groupId.text().startsWith('org.apache.maven.shared')) {
                        dependency.scope*.value = 'provided'
                    }
                }
    }
}

integrationTest {
    environment "hibernateVersion", project.version
    environment "h2Version", libs.versions.h2.get()
    if ( project.hasProperty( 'MAVEN_MIRROR' ) ) {
        environment "MAVEN_MIRROR", project.property( 'MAVEN_MIRROR' )
    }
    if ( project.hasProperty( 'MAVEN_MIRROR_USERNAME' ) ) {
        environment "MAVEN_MIRROR_USERNAME", project.property( 'MAVEN_MIRROR_USERNAME' )
    }
    if ( project.hasProperty( 'MAVEN_MIRROR_PASSWORD' ) ) {
        environment "MAVEN_MIRROR_PASSWORD", project.property( 'MAVEN_MIRROR_PASSWORD' )
    }
    testLogging {
        exceptionFormat = 'full'
    }
}

integrationTest.dependsOn project(':hibernate-core').tasks.publishToMavenLocal
integrationTest.dependsOn ':hibernate-reveng:publishToMavenLocal'
integrationTest.dependsOn ":hibernate-platform:publishToMavenLocal"
integrationTest.dependsOn publishToMavenLocal
check.dependsOn integrationTest
