plugins {
    id "local.publishing-java-module"
}

description = "Library providing functionality to perform reverse engineering Hibernate related artefacts from an existing database"

// Legacy tests originated from Hibernate Tools and require a live JDBC connection
// (they create schemas and perform actual reverse engineering against an in-memory database).
// They are kept in a separate source set to preserve them as-is until they can be rewritten
// or replaced and integrated into the normal test structure.
sourceSets {
    legacyTest {
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}

configurations {
    legacyTestImplementation.extendsFrom testImplementation
    legacyTestRuntimeOnly.extendsFrom testRuntimeOnly
}

dependencies {
    implementation project( ':hibernate-core' )
    implementation libs.commonsCollections4
    // kept as a direct dependency to avoid conflicts with the spotless plugin's
    // internal use of google-java-format for removeUnusedImports()
    implementation "com.google.googlejavaformat:google-java-format:1.27.0"
    implementation libs.freemarker
    implementation libs.antlrRuntime
    implementation jakartaLibs.jaxbApi
    testRuntimeOnly jakartaLibs.ejb
}

tasks.register('legacyTest', Test) {
    description = 'Runs legacy tests.'
    group = 'verification'
    testClassesDirs = sourceSets.legacyTest.output.classesDirs
    classpath = sourceSets.legacyTest.runtimeClasspath
    useJUnitPlatform()
}

tasks.forbiddenApisLegacyTest {
    enabled = false
}

test.dependsOn legacyTest

