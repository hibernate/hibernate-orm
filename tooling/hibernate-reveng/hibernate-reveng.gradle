plugins {
    id "local.publishing-java-module"
}

description = "Library providing functionality to perform reverse engineering Hibernate related artefacts from an existing database"

dependencies {
    implementation project( ':hibernate-core' )
    implementation libs.commonsCollections
    // kept as a direct dependency to avoid conflicts with the spotless plugin's
    // internal use of google-java-format for removeUnusedImports()
    implementation libs.googleJavaFormatter
    implementation libs.freemarker
    implementation libs.antlrRuntime
    implementation libs.jakarta.jaxbApi
    testRuntimeOnly libs.jakarta.ejb
}
